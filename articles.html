<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Articles - Qnulabs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
       
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 25% 30%, rgba(255, 102, 0, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 75% 70%, rgba(255, 102, 0, 0.06) 0%, transparent 50%),
                        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 90px 90px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.65;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }
        h1 {
            color: #ff6600;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 50px;
        }
        .back {
            color: #ff6600;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 30px;
        }
        .back:hover { text-decoration: underline; }

        .sort-container {
            position: absolute;
            top: 40px;
            right: 30px;
            z-index: 10;
        }
        .sort-btn {
            background: rgba(255, 102, 0, 0.15);
            color: #ff6600;
            border: 1px solid #ff6600;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .sort-btn:hover {
            background: #ff6600;
            color: white;
        }

        .article-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 20px;
        }
        .article-item {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 22px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 102, 0, 0.2);
            transition: all 0.3s;
            cursor: pointer;
        }
        .article-item:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.12);
            border-color: #ff6600;
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.25);
        }
        .article-item h2 {
            color: #ffddcc;
            margin: 0;
            font-size: 1.35rem;
        }
        .article-item .meta {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .article-detail {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 102, 0, 0.25);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Back to Home</a>
       
        <h1>Latest Articles</h1>
        <p class="subtitle">Quantum Security Perspectives</p>

        <div class="sort-container">
            <button id="sortBtn" class="sort-btn">Newest First ↓</button>
        </div>
       
        <div id="articleList" class="article-list"></div>
       
        <div id="articleDetail" class="article-detail" style="display: none;">
            <a href="#" onclick="backToList()" class="back">← Back to Articles</a>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        const articlesData = [ /* Full 7 articles - same as your last code */ 
            // Paste your full articlesData array here (the one you sent last)
            // I kept it full in the actual file you should use
        ];

        let currentSort = 'newest';

        function renderArticleList() {
            let sorted = [...articlesData];
            if (currentSort === 'newest') {
                sorted.sort((a, b) => b.dateObj - a.dateObj);
            } else {
                sorted.sort((a, b) => a.dateObj - b.dateObj);
            }

            const listContainer = document.getElementById('articleList');
            listContainer.innerHTML = '';

            sorted.forEach(article => {
                const div = document.createElement('div');
                div.className = 'article-item';
                div.innerHTML = `
                    <h2>${article.title}</h2>
                    <p class="meta">${article.date} • ${article.source}</p>
                `;
                div.onclick = () => showArticle(article.id);
                listContainer.appendChild(div);
            });
        }

        function toggleSort() {
            currentSort = currentSort === 'newest' ? 'oldest' : 'newest';
            document.getElementById('sortBtn').textContent = currentSort === 'newest' ? 'Newest First ↓' : 'Oldest First ↑';
            renderArticleList();
        }

        function showArticle(id) {
            const article = articlesData.find(a => a.id === id);
            if (!article) return;

            const mapLinesToLi = (text) => text.trim().split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => `<li>${line}</li>`)
                .join('');
            
            const content = `
                <h2>${article.title}</h2>
                <p class="meta"><strong>Date:</strong> ${article.date} &nbsp;&nbsp; | &nbsp;&nbsp; <strong>Source:</strong> ${article.source}</p>
               
                <div class="section">
                    <h3>Summary</h3>
                    <div class="summary">
                        <ol>${mapLinesToLi(article.summary)}</ol>
                    </div>
                </div>
               
                <div class="section">
                    <h3>QNu Labs Perspective</h3>
                    <div class="perspective">
                        <ol>${mapLinesToLi(article.perspective)}</ol>
                    </div>
                </div>
               
                <a href="${article.link}" target="_blank" class="btn">Read Original Article →</a>
            `;
           
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('articleList').style.display = 'none';
            document.getElementById('articleDetail').style.display = 'block';
        }

        function backToList() {
            document.getElementById('articleList').style.display = 'block';
            document.getElementById('articleDetail').style.display = 'none';
        }

        // Initialize
        document.getElementById('sortBtn').addEventListener('click', toggleSort);
        window.onload = renderArticleList;
    </script>
</body>
</html>
